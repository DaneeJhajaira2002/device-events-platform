services:

  postgres:
    image: postgres:15
    container_name: device-events-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: device_events
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: device-events-redis
    ports:
      - "6379:6379"

  backend:
    build: ../backend
    container_name: device-events-backend
    depends_on:
      - postgres
      - redis
    restart: always
    environment:
      PORT: 3001
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      DB_NAME: device_events
      REDIS_HOST: redis
      REDIS_PORT: 6379
    ports:
      - "3001:3001"

  frontend:
    build: ../frontend
    container_name: device-events-frontend
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001
      NEXT_PUBLIC_WS_URL: http://localhost:3001
    ports:
      - "3000:3000"

volumes:
  postgres_data: